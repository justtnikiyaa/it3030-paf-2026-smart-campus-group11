spring.application.name=smart-campus-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_campus_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.security=DEBUG

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.security.admin-emails=${ADMIN_EMAILS:nihindudulavin02@gmail.com,kaweeshadewranga05@gmail.com}

server.servlet.session.cookie.same-site=lax

server.error.include-message=always

# ── File upload (Module C) ────────────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/
