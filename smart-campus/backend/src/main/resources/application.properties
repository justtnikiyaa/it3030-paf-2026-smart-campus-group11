spring.application.name=smart-campus-backend
spring.config.import=optional:file:.env

spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:h2:mem:smart_campus_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.security=DEBUG

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.security.admin-emails=${ADMIN_EMAILS:nihindudulavin02@gmail.com,kaweeshadewranga05@gmail.com}

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

server.port=${PORT:8081}
server.error.include-message=always
server.forward-headers-strategy=framework

# ── File upload (Module C) ────────────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/
